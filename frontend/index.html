<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashcards</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <select id="themeSelector">
        <option value="theme-2">🌊 Brisa Marina</option>
        <option value="theme-1">🌸 Sakura Pastel</option>
        <option value="theme-3">🌑 Noche Elegante</option>
    </select>

    <div class="container">
        <div class="card" id="flashcard">
            <div class="card-inner">
                <div class="front" id="question">Cargando...</div>
                <div class="back" id="answer">...</div>
            </div>
            <div class="badge" id="statusBadge">Estado</div>
        </div>

        <div class="controls">
            <button onclick="prevCard()">⬅ Anterior</button>
            <button onclick="nextCard()">Siguiente ➡</button>
        </div>

        <div class="status-controls">
            <button onclick="setStatus('NO_CONOCIDA')">❌ No conocida</button>
            <button onclick="setStatus('MEDIO')">🟡 Medio</button>
            <button onclick="setStatus('APRENDIDA')">✅ Aprendida</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
